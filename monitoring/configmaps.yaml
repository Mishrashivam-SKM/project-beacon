apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus-config.yaml: |-
    serverFiles:
      prometheus.yml:
        scrape_configs:
          - job_name: 'beacon-app'
            metrics_path: '/api/health'
            static_configs:
              - targets: ['beacon-service.beacon.svc.cluster.local:80']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alerting-rules
  namespace: monitoring
data:
  alerting-rules.yaml: |-
    groups:
      - name: beacon-alerts
        rules:
          - alert: InstanceDown
            expr: up{job="beacon-app"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Instance {{ $labels.instance }} down"
              description: "Project Beacon has been down for more than 1 minute."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: monitoring
data:
  grafana-dashboard.json: |-
    {
      "title": "Project Beacon Dashboard",
      "panels": [
        {
          "type": "stat",
          "title": "Application Uptime",
          "targets": [
            {
              "expr": "up{job=\"beacon-app\"}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP Request Duration",
          "targets": [
            {
              "expr": "rate(http_request_duration_seconds_sum[5m]) / rate(http_request_duration_seconds_count[5m])"
            }
          ]
        }
      ]
    }
